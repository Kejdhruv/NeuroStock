services:
  - type: web
    name: neurostock-backend
    runtime: node
    rootDir: Backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: STOCKDATA
      - key: TOKEN_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false
